name: Contracts API Tests

on:
  push:
    branches: [main]
    # Avoid an infinite loop: the auto-published report commit only touches
    # report/**, so ignoring that path stops it from re-triggering this run.
    paths-ignore:
      - 'report/**'
  schedule:
    # Daily at 03:00 UTC (06:00 Asia/Riyadh). Emails the HTML report.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        default: sandbox
        options:
          - sandbox
          - uat

concurrency:
  group: api-tests-${{ github.ref }}
  cancel-in-progress: true

# Allow the job to commit the refreshed HTML report back to the repo.
permissions:
  contents: write

jobs:
  test:
    name: Run API test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CONTRACTS_ENV: ${{ github.event.inputs.environment || 'sandbox' }}
      CONTRACTS_CLIENT_ID: ${{ secrets.CONTRACTS_CLIENT_ID }}
      CONTRACTS_API_KEY: ${{ secrets.CONTRACTS_API_KEY }}
      CONTRACTS_SECRET_KEY: ${{ secrets.CONTRACTS_SECRET_KEY }}
      SANDBOX_BASE_URL: ${{ vars.SANDBOX_BASE_URL }}
      UAT_BASE_URL: ${{ vars.UAT_BASE_URL }}
      # Optional seed data — set as repo secrets to enable signed-state happy paths.
      SIGNED_CONTRACT_NUMBER: ${{ secrets.SIGNED_CONTRACT_NUMBER }}
      SIGNED_ADDENDUM_REF: ${{ secrets.SIGNED_ADDENDUM_REF }}
      SANAD_GROUP_UUID: ${{ secrets.SANAD_GROUP_UUID }}
      NAFATH_TRACE_ID: ${{ secrets.NAFATH_TRACE_ID }}
      EXISTING_CONTRACT_NUMBER: ${{ secrets.EXISTING_CONTRACT_NUMBER }}
      EXISTING_BENEFICIARY_NID: ${{ secrets.EXISTING_BENEFICIARY_NID }}
      # Email — set these secrets to enable the daily HTML-report email.
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Generate sample fixture
        run: npm run gen:fixture

      - name: Unit tests (signer — offline)
        run: npm run test:unit

      - name: API tests (live sandbox/uat)
        run: npx playwright test --project=api

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/
          retention-days: 14

      - name: Publish HTML report to repo (overwrite latest)
        if: ${{ !cancelled() }}
        run: |
          node scripts/publish-report.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report/index.html
          if git diff --cached --quiet; then
            echo "Report unchanged — nothing to commit."
          else
            git commit -m "Update HTML execution report (run ${GITHUB_RUN_ID}) [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME} || (git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME})
          fi

      - name: Email HTML report (daily / on failure)
        if: ${{ !cancelled() && env.REPORT_EMAIL_TO != '' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || failure()) }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Contracts API Tests — ${{ job.status }} — ${{ env.CONTRACTS_ENV }} (run ${{ github.run_id }})"
          to: ${{ secrets.REPORT_EMAIL_TO }}
          from: Contracts API CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Contracts API automated test report.

            Status:      ${{ job.status }}
            Environment: ${{ env.CONTRACTS_ENV }}
            Trigger:     ${{ github.event_name }}
            Commit:      ${{ github.sha }}
            Run log:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The full Playwright HTML report is attached (open index.html in a browser).
          attachments: report/index.html

      - name: Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":x: Contracts API tests failed on \`${GITHUB_REF_NAME}\` (env: ${CONTRACTS_ENV}). Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"
